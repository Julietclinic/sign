<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>網路預約系統</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Microsoft JhengHei",sans-serif;
    }

    body{
      background:#f8f8f8;
      color:#222;
    }

    /* ===== Header ===== */
    .header{
      width:100%;
      padding:15px 30px;
      background:#fff;
      border-bottom:1px solid #ddd;

      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .left{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo-img{
      height:55px;
      width:auto;
    }

    .logo-sub{
      font-size:12px;
      color:#666;
    }

    .title{
      font-size:32px;
      font-weight:700;
      text-align:right;
    }

    /* ===== Main ===== */
    .container{
      max-width:1300px;
      margin:60px auto;
      padding:0 20px;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:40px;
    }

    /* ===== Card ===== */
    .clinic-card{
      background:#fff;
      border:2px solid #e5e5e5;
      min-height:550px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      transition:0.25s;
      border-radius:10px;
    }

    .clinic-card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .clinic-icon{
      width:100px;
      margin-bottom:30px;
    }

    .clinic-name{
      font-size:36px;
      font-weight:700;
      margin-bottom:50px;
      text-align:center;
    }

    /* 按鈕 */
    .reserve-btn{
      width:240px;
      height:65px;

      border:none;
      border-radius:999px;

      background:#ef9d93;
      color:#fff;

      font-size:28px;
      font-weight:700;

      cursor:pointer;
      transition:0.2s;
    }

    .reserve-btn:hover{
      background:#ea887c;
      transform:scale(1.05);
    }

    /* ===== 手機版 ===== */
    @media(max-width:768px){

      .header{
        padding:12px 15px;
      }

      .logo-img{
        height:45px;
      }

      .title{
        font-size:22px;
      }

      .clinic-name{
        font-size:28px;
      }

      .reserve-btn{
        width:200px;
        height:55px;
        font-size:22px;
      }
    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">

    <!-- 左側 LOGO -->
    <div class="left">
      <img src="logo.png" class="logo-img">

      <div class="logo-sub">
        Juliet Breast Medical Group
      </div>
    </div>

    <!-- 右側標題 -->
    <div class="title">
      網路預約系統
    </div>

  </div>

  <!-- Main -->
  <div class="container">

    <!-- 中科 -->
    <div class="clinic-card">

      <img
        class="clinic-icon"
        src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png"
      >

      <div class="clinic-name">
        中科茱麗葉診所
      </div>

      <button
        class="reserve-btn"
        onclick="location.href='https://pinmed.co/clinic/1d0omy2e/his-booking/form'"
      >
        預約掛號
      </button>

    </div>

    <!-- 惠文 -->
    <div class="clinic-card">

      <img
        class="clinic-icon"
        src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png"
      >

      <div class="clinic-name">
        惠文茱麗葉診所
      </div>

      <button
        class="reserve-btn"
        onclick="location.href='https://pinmed.co/clinic/mjfc85z1/his-booking/form'"
      >
        預約掛號
      </button>

    </div>

  </div>

</body>
</html>
